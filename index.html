<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Desabilita a seleção de texto na página inteira para dificultar cópias */
        body {
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Estilos adicionais para a tabela parecer uma planilha */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .cell-input {
            width: 100%;
            height: 100%;
            min-height: 48px;
            text-align: center;
            background: transparent;
            outline: none;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
        }
        .cell-input:hover {
            background: #f8fafc;
        }
        .cell-input:focus {
            border: 2px solid #3b82f6;
            background: #eff6ff;
            border-radius: 6px;
            transform: scale(1.02);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
            z-index: 10;
            position: relative;
        }
        .cell-input:invalid {
            background: #fee2e2;
            color: #b91c1c;
        }
        table { border-spacing: 0; }
        tbody tr { transition: background-color 0.2s ease; }
        tbody tr:hover { background-color: #f1f5f9 !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" id="app-body">

    <!-- Container principal onde tudo será injetado após a senha -->
    <div id="root-app" class="w-full h-full flex flex-col"></div>

    <!-- Tela de Login Inicial (Fica sobre tudo) -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[99999]">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center transform transition-all">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-shield-alt text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Acesso Restrito</h2>
            <p class="text-sm text-slate-500 mb-6">Área exclusiva para professores.</p>
            
            <button id="btn-entrar-google" class="w-full bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-lg transition-all active:scale-95 shadow-sm flex justify-center items-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5">
                Entrar com E-mail Institucional
            </button>
            <p id="erro-login" class="text-red-500 mt-4 hidden font-semibold text-xs bg-red-50 p-2 rounded border border-red-200 break-words">
                <i class="fas fa-exclamation-circle"></i> <span id="texto-erro-login">Acesso negado.</span>
            </p>
        </div>
    </div>

    <!-- ====================================================================== -->
    <!-- TODO O CÓDIGO ABAIXO PODE SER COPIADO E JOGADO EM UM OFUSCADOR DE JS   -->
    <!-- ====================================================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteField } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ============================================================================
        // 0. CONTROLE DE ACESSO (E-MAILS E DOMÍNIOS PERMITIDOS)
        // ============================================================================
        
        // COLOQUE AQUI O FINAL DO E-MAIL INSTITUCIONAL DA SUA ESCOLA
        // Exemplo: se o email é professor@edu.escola.br, coloque "@edu.escola.br"
        // Qualquer pessoa logada com um email do Google terminando nisso vai entrar.
        const DOMINIO_PERMITIDO = "@educador.edu.es.gov.br"; 
        
        // Mantive a lista caso você queira permitir e-mails pessoais específicos como exceção
        const EMAILS_PERMITIDOS = [
            "rodrigopelages@gmail.com"
        ];

        // Bloquear botão direito do mouse
        document.addEventListener('contextmenu', event => event.preventDefault());

        // Bloquear atalhos de teclado de desenvolvedor (F12, Inspecionar, Ver Código Fonte)
        document.addEventListener('keydown', function(e) {
            // F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+I (Inspecionar)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.keyCode === 73)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+J (Console)
            if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j' || e.keyCode === 74)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+Shift+C (Inspecionar Elemento)
            if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c' || e.keyCode === 67)) {
                e.preventDefault();
                return false;
            }
            // Ctrl+U (Ver código fonte)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u' || e.keyCode === 85)) {
                e.preventDefault();
                return false;
            }
            // Evitar impressão (Ctrl+P) opcional
            if (e.ctrlKey && (e.key === 'P' || e.key === 'p' || e.keyCode === 80)) {
                e.preventDefault();
                return false;
            }
        });

        // ============================================================================
        // 3. LÓGICA DE LOGIN COM GOOGLE E CONTROLE DE USUÁRIO
        // ============================================================================
        let estado = {
            turmaSelecionada: '', 
            professorSelecionado: 'Todos',
            notas: {},
            historico: [],
            usuarioLogado: null // Guarda quem está usando o sistema agora
        };

        const CORES_PROFESSORES = {
            'Profª Letícia': 'bg-pink-100', 'Prof. Romerson': 'bg-sky-100',
            'Prof. Rodrigo': 'bg-emerald-100', 'Prof. Caéco': 'bg-amber-100',
            'Profª Beatriz': 'bg-violet-100', 'Profª Lorena': 'bg-teal-100'
        };

        let estadoDesfazer = null;
        let timerDesfazer = null;
        let db, auth;
        let userId = null;
        let dadosCarregadosInicialmente = false; 
        let isSaving = false;

        async function inicializarAppEFirebase() {
            try {
                let firebaseConfig = {
                    apiKey: "AIzaSy" + "B5pYi6Et_Q4ZShfDXusLNwiZdyFwqm7SI",
                    authDomain: "media-de-area.firebaseapp.com",
                    projectId: "media-de-area",
                    storageBucket: "media-de-area.firebasestorage.app",
                    messagingSenderId: "136992091036",
                    appId: "1:136992091036:web:fd35efbbb11ec978c07659",
                    measurementId: "G-2XLDLLSCSQ"
                };

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Configura o botão do Google
                document.getElementById('btn-entrar-google').addEventListener('click', fazerLoginComGoogle);

                // Ouve as mudanças de autenticação do Firebase (Detecta se o usuário já fez login antes)
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const emailUsuario = user.email.toLowerCase();
                        
                        // Verifica se o domínio bate OU se está na lista de e-mails permitidos
                        const dominioOk = DOMINIO_PERMITIDO !== "" && emailUsuario.endsWith(DOMINIO_PERMITIDO.toLowerCase());
                        const emailOk = EMAILS_PERMITIDOS.map(e => e.toLowerCase()).includes(emailUsuario);

                        if (dominioOk || emailOk) {
                            userId = user.uid;
                            // Salva os dados do usuário para registrar no histórico depois
                            estado.usuarioLogado = { 
                                nome: user.displayName || user.email.split('@')[0], 
                                email: user.email 
                            };

                            document.getElementById('login-overlay').style.display = 'none';
                            document.getElementById('app-body').classList.remove('overflow-hidden');
                            
                            // Carrega a interface do app apenas uma vez
                            if (!document.getElementById('main-header')) {
                                document.getElementById('root-app').innerHTML = APP_HTML_TEMPLATE;
                                iniciarSistemaDeFato(user);
                            }
                            
                            atualizarStatusNuvem(true, "Conectado");
                            escutarDadosDoBanco();
                        } else {
                            // Se logou com um e-mail de fora da lista/domínio, expulsa imediatamente
                            await signOut(auth);
                            mostrarErroLogin(`O e-mail (${emailUsuario}) não pertence ao domínio institucional permitido.`);
                        }
                    } else {
                        // Ninguém logado, mostra o botão do Google
                        userId = null;
                        estado.usuarioLogado = null;
                        document.getElementById('login-overlay').style.display = 'flex';
                        document.getElementById('root-app').innerHTML = ''; 
                    }
                });
            } catch (erro) {
                console.error("Erro Firebase:", erro);
                mostrarErroLogin("Erro de conexão com o banco de dados.");
            }
        }

        async function fazerLoginComGoogle() {
            const provider = new GoogleAuthProvider();
            // provider.setCustomParameters({ hd: 'escola.edu.br' }); // Se tiver domínio, tire o "//" do início dessa linha para forçar login institucional
            try {
                document.getElementById('erro-login').classList.add('hidden');
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Erro no login:", error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    mostrarErroLogin(`Erro: ${error.code}. Verifique se o domínio está autorizado no Firebase.`);
                } else {
                    mostrarErroLogin("O pop-up de login foi fechado ou bloqueado pelo navegador.");
                }
            }
        }

        function mostrarErroLogin(mensagem) {
            const erro = document.getElementById('erro-login');
            const textoErro = document.getElementById('texto-erro-login');
            
            textoErro.textContent = mensagem;
            erro.classList.remove('hidden');
            
            // Efeito visual de erro
            const card = erro.parentElement;
            card.classList.add('translate-x-2');
            setTimeout(() => card.classList.remove('translate-x-2'), 100);
            setTimeout(() => card.classList.add('-translate-x-2'), 200);
            setTimeout(() => card.classList.remove('-translate-x-2'), 300);
        }

        function iniciarSistemaDeFato(usuario) {
            // Estética
            const header = document.getElementById('main-header');
            const gradientsPairs = [['from-blue-700', 'to-blue-500'], ['from-purple-700', 'to-purple-500'], ['from-indigo-700', 'to-indigo-500'], ['from-teal-700', 'to-teal-500']];
            header.classList.add(...gradientsPairs[Math.floor(Math.random() * gradientsPairs.length)]);

            // Mapear Modais
            document.getElementById('btn-fechar-historico').addEventListener('click', fecharModalHistorico);
            document.getElementById('btn-desfazer-acao').addEventListener('click', executarDesfazer);
            document.getElementById('btn-fechar-desfazer').addEventListener('click', esconderToastDesfazer);

            // Botão de Logout (Sair)
            if (!document.getElementById('btn-sair-sistema')) {
                const btnSair = document.createElement('button');
                btnSair.id = 'btn-sair-sistema';
                const nomeDisplay = usuario.displayName ? usuario.displayName.split(' ')[0] : usuario.email.split('@')[0];
                btnSair.innerHTML = `<i class="fas fa-sign-out-alt"></i> Sair (${nomeDisplay})`;
                btnSair.className = "bg-red-500/20 hover:bg-red-500 text-white text-sm px-3 py-1.5 rounded ml-3 transition-colors border border-red-500/30 font-semibold";
                btnSair.onclick = () => signOut(auth);
                document.getElementById('main-header').appendChild(btnSair);
            }

            inicializarInterface();
        }

        function escutarDadosDoBanco() {
            if (!userId) return;
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    estado.notas = docSnap.data().notas || {};
                    estado.historico = docSnap.data().historico || [];
                } else {
                    estado.notas = {}; estado.historico = [];
                }
                
                document.getElementById('loading-overlay').style.display = 'none';
                if (!dadosCarregadosInicialmente) {
                    dadosCarregadosInicialmente = true;
                    renderizarPlanilha(); 
                } else if (estado.turmaSelecionada) {
                    atualizarValoresNaTela();
                }
            }, (erro) => {
                console.error("Erro Firestore:", erro);
                alert("Erro de segurança: Você não tem permissão para acessar as notas. Verifique as regras no Firebase.");
            });
        }

        async function salvarNotaIndividualNoBanco(chave, valor) {
            if (!userId) return;
            atualizarStatusNuvem(true, "Salvando...");
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');
            try {
                const payload = { notas: {} };
                payload.notas[chave] = valor !== null ? valor : deleteField();
                await setDoc(docRef, payload, { merge: true });
                atualizarStatusNuvem(true, "Salvo na nuvem");
            } catch (e) { atualizarStatusNuvem(false, "Erro ao salvar"); }
        }

        async function salvarBatchNoBanco(payload) {
            if (!userId) return;
            atualizarStatusNuvem(true, "Salvando lote...");
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');
            await setDoc(docRef, payload, { merge: true });
            atualizarStatusNuvem(true, "Salvo");
        }

        // REGISTRA NO HISTÓRICO COM O NOME E E-MAIL DO PROFESSOR
        async function registrarNoHistorico(descricao) {
            if (!userId) return;
            const snapshot = {
                id: Date.now().toString(),
                data: new Date().toLocaleString('pt-BR'),
                descricao: descricao,
                autor: estado.usuarioLogado ? estado.usuarioLogado.nome : 'Desconhecido',
                email: estado.usuarioLogado ? estado.usuarioLogado.email : 'sem-email',
                qtdNotas: Object.keys(estado.notas).length,
                notas: JSON.parse(JSON.stringify(estado.notas))
            };
            
            if (estado.historico.length > 0 && JSON.stringify(estado.historico[0].notas) === JSON.stringify(snapshot.notas)) return;
            
            estado.historico.unshift(snapshot);
            if (estado.historico.length > 25) estado.historico.pop();
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');
            await setDoc(docRef, { historico: estado.historico }, { merge: true });
        }

        async function salvarDadosNoBanco(mostrarAviso = false) {
            if (!userId || isSaving) return;
            isSaving = true;
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');
            try {
                await setDoc(docRef, { notas: estado.notas }, { merge: true });
                if (mostrarAviso) { 
                    await registrarNoHistorico("Ponto Restauração Manual"); 
                    mostrarToast(); 
                }
            } finally { isSaving = false; }
        }

        // Auto Backup com rastreio de autor
        setInterval(async () => {
            if (!userId || !estado.historico) return;
            const atual = JSON.stringify(estado.notas);
            const antigo = estado.historico.length > 0 ? JSON.stringify(estado.historico[0].notas) : "{}";
            if (atual !== antigo) {
                const nomeUsuario = estado.usuarioLogado ? estado.usuarioLogado.nome : 'Sistema';
                await registrarNoHistorico(`Auto-backup (${nomeUsuario})`);
            }
        }, 600000);

        function abrirModalHistorico() {
            const modal = document.getElementById('modal-historico');
            const lista = document.getElementById('lista-historico');
            lista.innerHTML = '';
            
            if (estado.historico.length === 0) {
                lista.innerHTML = `<p class="text-center p-8 text-slate-500">Nenhum backup encontrado.</p>`;
            } else {
                estado.historico.forEach(v => {
                    lista.innerHTML += `
                        <div class="bg-white border rounded p-4 mb-2 flex justify-between items-start sm:items-center flex-col sm:flex-row gap-3">
                            <div>
                                <strong class="text-slate-800">${v.descricao}</strong><br>
                                <small class="text-slate-500"><i class="far fa-clock"></i> ${v.data}</small><br>
                                <small class="text-blue-600 font-medium"><i class="fas fa-user-edit"></i> ${v.autor || 'Sistema'} (${v.email || ''})</small>
                            </div>
                            <button class="btn-restaurar-v bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded font-semibold transition-colors shadow-sm" data-id="${v.id}">Restaurar</button>
                        </div>`;
                });
                
                document.querySelectorAll('.btn-restaurar-v').forEach(btn => {
                    btn.addEventListener('click', (e) => restaurarVersao(e.target.dataset.id));
                });
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function fecharModalHistorico() {
            document.getElementById('modal-historico').classList.add('hidden');
            document.getElementById('modal-historico').classList.remove('flex');
        }

        async function restaurarVersao(id) {
            const v = estado.historico.find(x => x.id === id);
            if (!v || !confirm("Restaurar esta versão? As notas atuais serão perdidas.")) return;
            
            fecharModalHistorico();
            await registrarNoHistorico(`Backup antes de restaurar ${v.data}`);
            estado.notas = JSON.parse(JSON.stringify(v.notas));
            renderizarPlanilha();
            
            const docRef = doc(db, 'artifacts', 'sistema-diario-notas', 'public', 'data', 'registros_diarios', 'notas_gerais');
            await setDoc(docRef, { notas: estado.notas }, { merge: true });
            mostrarToast("Versão restaurada!");
        }

        function salvarEstadoDesfazer(notasOriginais, msg) {
            estadoDesfazer = notasOriginais;
            document.getElementById('toast-desfazer-msg').textContent = msg;
            document.getElementById('toast-desfazer').classList.remove('translate-y-32', 'opacity-0');
            clearTimeout(timerDesfazer);
            timerDesfazer = setTimeout(esconderToastDesfazer, 10000);
        }

        function esconderToastDesfazer() {
            document.getElementById('toast-desfazer').classList.add('translate-y-32', 'opacity-0');
            estadoDesfazer = null;
        }

        async function executarDesfazer() {
            if (!estadoDesfazer) return;
            let payload = { notas: {} };
            for (const c in estadoDesfazer) {
                if (estadoDesfazer[c] === null) { delete estado.notas[c]; payload.notas[c] = deleteField(); } 
                else { estado.notas[c] = estadoDesfazer[c]; payload.notas[c] = estadoDesfazer[c]; }
            }
            esconderToastDesfazer(); renderizarPlanilha(); salvarBatchNoBanco(payload); mostrarToast("Ação desfeita");
        }

        async function preencherColuna(discId) {
            const tId = estado.turmaSelecionada;
            const input = document.getElementById(`input-repeat-${discId}`);
            let val = parseFloat(input.value);
            if (isNaN(val) || val < 1 || val > 6) return alert("Nota inválida (1 a 6)");
            if (!confirm(`Preencher coluna com ${val}?`)) return;

            let notasOriginais = {}, payload = { notas: {} };
            DADOS_ESCOLA.alunos[tId].forEach(a => {
                const c = `${tId}_${a.id}_${discId}`;
                notasOriginais[c] = estado.notas[c] !== undefined ? estado.notas[c] : null;
                estado.notas[c] = val; payload.notas[c] = val;
            });

            salvarEstadoDesfazer(notasOriginais, `Coluna preenchida`);
            renderizarPlanilha(); salvarBatchNoBanco(payload);
            await registrarNoHistorico(`Preencheu coluna com ${val}`);
            input.value = '';
        }

        async function limparColuna(discId) {
            const tId = estado.turmaSelecionada;
            if (!confirm("Apagar TODAS as notas desta coluna?")) return;

            let notasOriginais = {}, payload = { notas: {} }, mudou = false;
            DADOS_ESCOLA.alunos[tId].forEach(a => {
                const c = `${tId}_${a.id}_${discId}`;
                if (estado.notas[c] !== undefined) {
                    notasOriginais[c] = estado.notas[c];
                    delete estado.notas[c]; payload.notas[c] = deleteField(); mudou = true;
                }
            });

            if (!mudou) return alert("Coluna já vazia.");
            salvarEstadoDesfazer(notasOriginais, "Coluna apagada");
            renderizarPlanilha(); salvarBatchNoBanco(payload);
            await registrarNoHistorico(`Apagou coluna`);
        }

        function inicializarInterface() {
            const selTurma = document.getElementById('turma-select');
            selTurma.innerHTML = '<option value="" disabled selected>Selecione...</option>' + 
                                 DADOS_ESCOLA.turmas.map(t => `<option value="${t.id}">${t.nome}</option>`).join('');

            selTurma.addEventListener('change', (e) => {
                estado.turmaSelecionada = e.target.value;
                atualizarSeletorProfessor(); renderizarPlanilha();
            });

            document.getElementById('prof-select').addEventListener('change', (e) => {
                estado.professorSelecionado = e.target.value; renderizarPlanilha();
            });

            document.getElementById('btn-salvar').addEventListener('click', () => salvarDadosNoBanco(true));
            document.getElementById('btn-historico').addEventListener('click', abrirModalHistorico);
            document.getElementById('btn-exportar').addEventListener('click', exportarCSV);
            
            document.getElementById('btn-importar').addEventListener('click', () => document.getElementById('input-importar').click());
            document.getElementById('input-importar').addEventListener('change', (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => { processarCSV(ev.target.result); e.target.value = ''; };
                if(e.target.files[0]) reader.readAsText(e.target.files[0], 'UTF-8');
            });

            document.getElementById('table-body').addEventListener('input', (e) => {
                if(e.target.classList.contains('cell-input')) {
                    let v = parseFloat(e.target.value);
                    const ch = `${estado.turmaSelecionada}_${e.target.dataset.aluno}_${e.target.dataset.disciplina}`;
                    
                    if (!isNaN(v)) {
                        if(v < 1) v = 1; if(v > 6) v = 6;
                        estado.notas[ch] = v; salvarNotaIndividualNoBanco(ch, v);
                    } else if (e.target.value === '') {
                        delete estado.notas[ch]; salvarNotaIndividualNoBanco(ch, null);
                    }
                    calcularMedias();
                }
            });
        }

        function atualizarSeletorProfessor() {
            const sel = document.getElementById('prof-select');
            const tId = estado.turmaSelecionada;
            if (!tId) return;
            const profs = [...new Set(DADOS_ESCOLA.disciplinas[tId].map(d => d.professor))].sort();
            sel.innerHTML = `<option value="Todos">Todos</option>` + profs.map(p => `<option value="${p}">${p}</option>`).join('');
            estado.professorSelecionado = 'Todos'; sel.disabled = false;
        }

        function renderizarPlanilha() {
            const tId = estado.turmaSelecionada;
            if (!tId) return;
            document.getElementById('instructions-container').classList.add('hidden');
            document.getElementById('table-container').classList.remove('hidden');

            const alunos = DADOS_ESCOLA.alunos[tId];
            const discs = DADOS_ESCOLA.disciplinas[tId];
            const pSel = estado.professorSelecionado;

            // Header
            let th = `<tr><th class="px-4 py-3 bg-slate-200 min-w-[250px] sticky left-0 z-50">Nome do Aluno</th>`;
            discs.forEach(d => {
                const cor = (pSel !== 'Todos' && pSel === d.professor) ? CORES_PROFESSORES[d.professor] : '';
                th += `<th class="px-2 py-3 text-center w-32 border-l border-slate-300 ${cor}"><b>${d.nome}</b><br><small>${d.professor}</small></th>`;
            });
            th += `<th class="px-4 py-3 bg-blue-50 text-blue-800 text-center w-32">Média</th></tr>`;
            document.getElementById('table-head').innerHTML = th;

            // Body
            let tb = '';
            alunos.forEach(a => {
                tb += `<tr><td class="px-4 py-2 bg-white sticky left-0 z-20 font-medium border-b border-slate-200 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]">${a.nome}</td>`;
                discs.forEach(d => {
                    const c = `${tId}_${a.id}_${d.id}`;
                    const n = estado.notas[c] !== undefined ? estado.notas[c] : '';
                    const cor = (pSel !== 'Todos' && pSel === d.professor) ? CORES_PROFESSORES[d.professor] : '';
                    tb += `<td class="border-l border-b border-slate-200 p-0 ${cor}"><input type="number" class="cell-input" min="1" max="6" step="0.5" data-aluno="${a.id}" data-disciplina="${d.id}" value="${n}"></td>`;
                });
                tb += `<td class="px-4 py-2 bg-blue-50/50 text-center font-bold text-blue-800 border-l border-b border-blue-200" id="m-a-${a.id}">-</td></tr>`;
            });
            document.getElementById('table-body').innerHTML = tb;

            // Footer
            let tf = `<tr><td class="px-4 py-3 text-right font-bold bg-slate-50 sticky left-0 z-20">Média:</td>`;
            discs.forEach(d => { tf += `<td class="text-center font-bold text-blue-700 border-l border-slate-200" id="m-d-${d.id}">-</td>`; });
            tf += `<td class="text-center font-bold bg-blue-100 border-l border-blue-200" id="m-g">-</td></tr>`;
            
            // Ações rápidas (agora precisamos vincular os eventos manualmente pois tiramos do HTML inline)
            tf += `<tr class="bg-slate-100"><td class="px-4 py-3 text-right text-xs font-bold uppercase sticky left-0 z-20">Ações:</td>`;
            discs.forEach(d => {
                tf += `<td class="p-2 border-l border-slate-200 text-center">
                    <input type="number" id="input-repeat-${d.id}" class="w-16 text-center text-sm border p-1 rounded mb-1" placeholder="Nota"><br>
                    <button class="btn-preencher text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded mb-1" data-id="${d.id}">Repetir</button>
                    <button class="btn-limpar text-xs bg-red-100 text-red-700 px-2 py-1 rounded" data-id="${d.id}">Limpar</button>
                </td>`;
            });
            tf += `<td></td></tr>`;
            document.getElementById('table-foot').innerHTML = tf;

            // Bind dos botões dinâmicos do footer
            document.querySelectorAll('.btn-preencher').forEach(b => b.addEventListener('click', e => preencherColuna(e.target.dataset.id)));
            document.querySelectorAll('.btn-limpar').forEach(b => b.addEventListener('click', e => limparColuna(e.target.dataset.id)));

            calcularMedias();
        }

        function atualizarValoresNaTela() {
            document.querySelectorAll('.cell-input').forEach(i => {
                const n = estado.notas[`${estado.turmaSelecionada}_${i.dataset.aluno}_${i.dataset.disciplina}`];
                if (document.activeElement !== i) i.value = n !== undefined ? n : '';
            });
            calcularMedias();
        }

        function calcularMedias() {
            const tId = estado.turmaSelecionada; if(!tId) return;
            let sGt = 0, qGt = 0;

            DADOS_ESCOLA.alunos[tId].forEach(a => {
                let sA = 0, qA = 0;
                DADOS_ESCOLA.disciplinas[tId].forEach(d => {
                    const n = estado.notas[`${tId}_${a.id}_${d.id}`];
                    if(n !== undefined) { sA+=Number(n); qA++; }
                });
                const el = document.getElementById(`m-a-${a.id}`);
                if(el) { el.textContent = qA>0 ? (sA/qA).toFixed(1) : '-'; if(qA>0){sGt+=(sA/qA); qGt++;} }
            });

            DADOS_ESCOLA.disciplinas[tId].forEach(d => {
                let sD = 0, qD = 0;
                DADOS_ESCOLA.alunos[tId].forEach(a => {
                    const n = estado.notas[`${tId}_${a.id}_${d.id}`];
                    if(n !== undefined) { sD+=Number(n); qD++; }
                });
                const el = document.getElementById(`m-d-${d.id}`);
                if(el) el.textContent = qD>0 ? (sD/qD).toFixed(1) : '-';
            });

            const eg = document.getElementById('m-g');
            if(eg) eg.textContent = qGt>0 ? (sGt/qGt).toFixed(1) : '-';
        }

        // Export/Import simplificados para caber na lógica
        function exportarCSV() {
            const tId = estado.turmaSelecionada;
            if(!tId) return;
            let csv = "\uFEFFNome do Aluno;" + DADOS_ESCOLA.disciplinas[tId].map(d=>d.nome).join(';') + ";Média\n";
            DADOS_ESCOLA.alunos[tId].forEach(a => {
                let linha = [a.nome]; let s=0, q=0;
                DADOS_ESCOLA.disciplinas[tId].forEach(d => {
                    const n = estado.notas[`${tId}_${a.id}_${d.id}`];
                    linha.push(n!==undefined ? n.toString().replace('.',',') : '');
                    if(n!==undefined){ s+=Number(n); q++; }
                });
                linha.push(q>0 ? (s/q).toFixed(1).replace('.',',') : '');
                csv += linha.join(';') + "\n";
            });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
            link.download = `Backup_${tId}.csv`; link.click();
        }

        async function processarCSV(txt) {
            const tId = estado.turmaSelecionada; if(!tId) return;
            const lin = txt.replace(/^\uFEFF/,'').split('\n').map(x=>x.trim()).filter(x=>x);
            const head = lin[0].split(';');
            const mapD = {};
            DADOS_ESCOLA.disciplinas[tId].forEach(d => {
                const idx = head.indexOf(d.nome); if(idx>0) mapD[idx] = d.id;
            });
            let payload={notas:{}}, alt=0;
            for(let i=1; i<lin.length; i++) {
                const col = lin[i].split(';');
                const al = DADOS_ESCOLA.alunos[tId].find(x=>x.nome===col[0]);
                if(!al) continue;
                for(let j=1; j<col.length-1; j++) {
                    const dId = mapD[j]; if(!dId) continue;
                    const v = col[j].trim()==="" ? null : parseFloat(col[j].replace(',','.'));
                    const ch = `${tId}_${al.id}_${dId}`;
                    if(v !== null && !isNaN(v)) {
                        if(estado.notas[ch]!==v){ estado.notas[ch]=v; payload.notas[ch]=v; alt++; }
                    } else if(estado.notas[ch]!==undefined) {
                        delete estado.notas[ch]; payload.notas[ch]=deleteField(); alt++;
                    }
                }
            }
            if(alt>0) { renderizarPlanilha(); salvarBatchNoBanco(payload); await registrarNoHistorico("Restaurou CSV"); alert("Restaurado com sucesso!"); }
        }

        function atualizarStatusNuvem(ok, txt) {
            const i = document.getElementById('cloud-icon');
            if(i) i.className = ok ? "fas fa-cloud-check text-green-300" : "fas fa-cloud-xmark text-red-300";
            const t = document.getElementById('cloud-text');
            if(t) t.textContent = txt;
        }

        function mostrarToast(txt="Salvo com sucesso!") {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = txt;
            if(t) { t.classList.remove('translate-y-24','opacity-0'); setTimeout(()=>t.classList.add('translate-y-24','opacity-0'), 3000); }
        }

        // Dá o pontapé inicial no código
        inicializarAppEFirebase();

    </script>
</body>
