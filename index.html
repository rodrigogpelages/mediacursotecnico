<html lang="pt-BR">

    <style>
        /* Estilos adicionais para a tabela parecer uma planilha */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .cell-input {
            width: 100%;
            height: 100%;
            min-height: 48px;
            text-align: center;
            background: transparent;
            outline: none;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
        }
        .cell-input:hover {
            background: #f8fafc;
        }
        .cell-input:focus {
            border: 2px solid #3b82f6;
            background: #eff6ff;
            border-radius: 6px;
            transform: scale(1.02);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
            z-index: 10;
            position: relative;
        }
        .cell-input:invalid {
            background: #fee2e2;
            color: #b91c1c;
        }
        table { border-spacing: 0; }
        tbody tr { transition: background-color 0.2s ease; }
        tbody tr:hover { background-color: #f1f5f9 !important; }
    </style>

    <div class="hidden bg-pink-100 bg-sky-100 bg-emerald-100 bg-amber-100 bg-violet-100 bg-teal-100 bg-yellow-200 text-gray-800 text-gray-600 bg-white/50 border-r border-gray-200"></div>

    <header class="bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-lg p-4 flex justify-between items-center relative overflow-hidden">

                // TRAVA DE SEGURANÇA PARA O GITHUB: 
                if (firebaseConfig.apiKey === "SUA_API_KEY" || firebaseConfig.apiKey.includes("exemplo")) {
                    console.warn("Chaves do Firebase não configuradas. Rodando modo local (apenas backup CSV).");
                    
                    const avisoTexto = document.getElementById('aviso-nuvem-texto');
                    if(avisoTexto) {
                        avisoTexto.innerHTML = '<strong>Modo Offline/Local:</strong> O salvamento automático na nuvem está desativado porque o Firebase não foi configurado. Você pode continuar usando a planilha normalmente e salvar usando o botão <strong>"Baixar Backup"</strong>.';
                    }
                    
                    atualizarStatusNuvem(false, "Falta Configurar Firebase");
                    document.getElementById('loading-overlay').style.display = 'none';
                    return; // Interrompe a inicialização
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // TRATAMENTO MELHORADO DE ERRO DE AUTENTICAÇÃO
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authErro) {
                    console.error("Erro no Auth:", authErro);
                    if (authErro.code === 'auth/operation-not-allowed') {
                        const avisoTexto = document.getElementById('aviso-nuvem-texto');
                        if (avisoTexto) {
                            avisoTexto.innerHTML = '<strong class="text-red-700">Ação Necessária no Firebase:</strong> O salvamento na nuvem falhou porque o login <strong>"Anônimo"</strong> está desativado. Vá no painel do Firebase > Authentication > Sign-in method, e ative o provedor "Anônimo".';
                        }
                    }
                    throw authErro; 
                }

                // Monitora o login
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        atualizarStatusNuvem(true, "Conectado");
                        escutarDadosDoBanco();
                    } else {
                        userId = null;
                        atualizarStatusNuvem(false, "Desconectado");
                    }
                });
            } catch (erro) {
                console.error("Erro ao inicializar banco de dados:", erro);
                atualizarStatusNuvem(false, "Erro de Conexão");
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        // Ler dados do banco em tempo real
        function escutarDadosDoBanco() {
            if (!userId) return;
            
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sistema-diario-notas';
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'registros_diarios', 'notas_gerais');

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    estado.notas = docSnap.data().notas || {};
                }
                document.getElementById('loading-overlay').style.display = 'none';
                
                // OTIMIZAÇÃO: Só reconstrói a tabela inteira na primeira vez que abre
                if (!dadosCarregadosInicialmente) {
                    renderizarPlanilha(); 
                    dadosCarregadosInicialmente = true;
                } else {
                    // Se não for a primeira vez, faz uma atualização suave para não travar a tela
                    atualizarValoresNaTela();
                }
            }, (erro) => {
                console.error("Erro ao escutar dados:", erro);
                atualizarStatusNuvem(false, "Erro de Sincronia");
            });
        }

        // Salvar dados no banco
        async function salvarDadosNoBanco(mostrarAviso = false) {
            if (!userId) {
                if (mostrarAviso) {
                    alert("A nuvem não está conectada! Verifique se ativou o login Anônimo no Firebase. Use o botão 'Baixar Backup' para não perder seus dados enquanto isso.");
                }
                return;
            }
            
            atualizarStatusNuvem(true, "Salvando...");
            const btnSalvar = document.getElementById('btn-salvar');
            const conteudoOriginalBtn = btnSalvar.innerHTML;
            
            // Dá um feedback visual no botão ao salvar
            if (mostrarAviso) {
                btnSalvar.innerHTML = '<i class="fas fa-spinner fa-spin text-lg"></i> Salvando...';
                btnSalvar.disabled = true;
                btnSalvar.classList.add('opacity-75', 'cursor-not-allowed');
            }

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sistema-diario-notas';
            const docRef = doc(db, 'artifacts', appId, 'users', userId, 'registros_diarios', 'notas_gerais');
            
            try {
                await setDoc(docRef, { notas: estado.notas }, { merge: true });
                atualizarStatusNuvem(true, "Salvo na nuvem");
                if(mostrarAviso) mostrarToast();
            } catch (erro) {
                console.error("Erro ao salvar:", erro);
                atualizarStatusNuvem(false, "Erro ao salvar");
            } finally {
                // Restaura o botão ao normal
                if (mostrarAviso) {
                    btnSalvar.innerHTML = conteudoOriginalBtn;
                    btnSalvar.disabled = false;
                    btnSalvar.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            }
        }

        // ============================================================================
        // 3. LÓGICA DE INTERFACE E PLANILHA (HTML/DOM)
        // ============================================================================

        function inicializarInterface() {
            // Ordenar disciplinas em ordem alfabética para todas as turmas
            Object.keys(DADOS_ESCOLA.disciplinas).forEach(turmaId => {
                DADOS_ESCOLA.disciplinas[turmaId].sort((a, b) => a.nome.localeCompare(b.nome));
            });

            const seletor = document.getElementById('turma-select');
            seletor.innerHTML = DADOS_ESCOLA.turmas.map(t => 
                `<option value="${t.id}">${t.nome}</option>`
            ).join('');

            seletor.addEventListener('change', (e) => {
                estado.turmaSelecionada = e.target.value;
                atualizarSeletorProfessor();
                renderizarPlanilha();
            });

            const profSeletor = document.getElementById('prof-select');
            profSeletor.addEventListener('change', (e) => {
                estado.professorSelecionado = e.target.value;
                renderizarPlanilha();
            });

            document.getElementById('btn-salvar').addEventListener('click', () => {
                salvarDadosNoBanco(true);
            });

            // Chama na inicialização
            atualizarSeletorProfessor();

            // Botão de Exportar Backup
            document.getElementById('btn-exportar').addEventListener('click', exportarParaCSV);

            // Event Delegation para inputs de notas (Ouve digitações dinamicamente)
            document.getElementById('table-body').addEventListener('input', (e) => {
                if(e.target.classList.contains('cell-input')) {
                    const alunoId = e.target.dataset.aluno;
                    const discId = e.target.dataset.disciplina;
                    let valor = parseFloat(e.target.value);
                    
                    // Validação: Mínimo 1, Máximo 6
                    if (!isNaN(valor)) {
                        if(valor < 1) valor = 1;
                        if(valor > 6) valor = 6;
                        
                        const chave = `${estado.turmaSelecionada}_${alunoId}_${discId}`;
                        estado.notas[chave] = valor;
                    } else if (e.target.value === '') {
                        const chave = `${estado.turmaSelecionada}_${alunoId}_${discId}`;
                        delete estado.notas[chave]; // Remove a nota se apagar o campo
                    }
                    
                    calcularMediasEmTempoReal();

                    // Auto-salvamento após 1.5s que parar de digitar
                    clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => salvarDadosNoBanco(false), 1500);
                }
            });
            
            // Garantir que a exibição da nota cortada respeite limite visual
            document.getElementById('table-body').addEventListener('change', (e) => {
                 if(e.target.classList.contains('cell-input')) {
                     let valor = parseFloat(e.target.value);
                     if(!isNaN(valor)) {
                         e.target.value = valor; // Reflete no input o valor clamped
                     }
                 }
            });
        }

        function atualizarSeletorProfessor() {
            const turmaId = estado.turmaSelecionada;
            const disciplinas = DADOS_ESCOLA.disciplinas[turmaId] || [];
            
            // Extrair professores únicos da turma atual
            const professoresUnicos = [...new Set(disciplinas.map(d => d.professor))].sort();
            
            const profSeletor = document.getElementById('prof-select');
            let opcoesHTML = `<option value="Todos">Todos</option>`;
            professoresUnicos.forEach(prof => {
                opcoesHTML += `<option value="${prof}">${prof}</option>`;
            });
            profSeletor.innerHTML = opcoesHTML;
            
            // Reseta a seleção ao trocar de turma
            estado.professorSelecionado = 'Todos';
            profSeletor.value = 'Todos';
        }

        function renderizarPlanilha() {
            const turmaId = estado.turmaSelecionada;
            const alunos = DADOS_ESCOLA.alunos[turmaId] || [];
            const disciplinas = DADOS_ESCOLA.disciplinas[turmaId] || [];

            // 1. Cabeçalho
            let theadHTML = `<tr>
                <th scope="col" class="px-4 py-3 border-r border-gray-200 bg-gray-100 min-w-[200px]">Nome do Aluno</th>`;
            
            disciplinas.forEach(d => {
                const isDestacado = estado.professorSelecionado !== 'Todos' && estado.professorSelecionado === d.professor;
                const corFundoTh = isDestacado ? CORES_PROFESSORES[d.professor] || 'bg-yellow-200' : 'bg-transparent';
                
                theadHTML += `<th scope="col" class="px-2 py-3 border-r border-gray-200 text-center w-32 transition-colors duration-300 ${corFundoTh}">
                    <div class="font-bold text-gray-800">${d.nome}</div>
                    <div class="text-[10px] font-semibold text-gray-600 truncate bg-white/50 rounded mt-1 px-1 py-0.5" title="${d.professor}">${d.professor}</div>
                </th>`;
            });
            theadHTML += `<th scope="col" class="px-4 py-3 bg-blue-50 text-blue-800 text-center w-32 font-bold">Média do Aluno</th></tr>`;
            document.getElementById('table-head').innerHTML = theadHTML;

            // 2. Corpo (Alunos e Inputs)
            let tbodyHTML = '';
            alunos.forEach(aluno => {
                tbodyHTML += `<tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="px-4 py-2 border-r border-gray-200 font-medium">${aluno.nome}</td>`;
                
                disciplinas.forEach(d => {
                    const chave = `${turmaId}_${aluno.id}_${d.id}`;
                    const nota = estado.notas[chave] !== undefined ? estado.notas[chave] : '';
                    
                    const isDestacado = estado.professorSelecionado !== 'Todos' && estado.professorSelecionado === d.professor;
                    const corFundoTd = isDestacado ? CORES_PROFESSORES[d.professor] || 'bg-yellow-200' : 'bg-transparent';
                    
                    tbodyHTML += `<td class="border-r border-gray-200 p-0 transition-colors duration-300 ${corFundoTd}">
                        <input type="number" 
                               class="cell-input" 
                               min="1" max="6" step="0.5"
                               data-aluno="${aluno.id}" 
                               data-disciplina="${d.id}"
                               value="${nota}"
                               placeholder="-">
                    </td>`;
                });
                
                // Célula da média do aluno
                tbodyHTML += `<td class="px-4 py-2 bg-blue-50/30 text-center font-bold text-blue-800 border-l border-blue-100" id="media-aluno-${aluno.id}">-</td></tr>`;
            });
            
            if(alunos.length === 0) {
                tbodyHTML = `<tr><td colspan="${disciplinas.length + 2}" class="p-8 text-center text-gray-500">Nenhum aluno cadastrado nesta turma.</td></tr>`;
            }
            
            document.getElementById('table-body').innerHTML = tbodyHTML;

            // 3. Rodapé (Média da Turma)
            let tfootHTML = `<tr><td class="px-4 py-3 border-r border-gray-200 text-right">Média da Turma:</td>`;
            disciplinas.forEach(d => {
                const isDestacado = estado.professorSelecionado !== 'Todos' && estado.professorSelecionado === d.professor;
                const corFundoTf = isDestacado ? CORES_PROFESSORES[d.professor] || 'bg-yellow-200' : 'bg-transparent';
                
                tfootHTML += `<td class="px-4 py-3 border-r border-gray-200 text-center font-bold text-blue-700 transition-colors duration-300 ${corFundoTf}" id="media-disc-${d.id}">-</td>`;
            });
            tfootHTML += `<td class="px-4 py-3 bg-blue-100 text-blue-900 text-center" id="media-geral-turma">-</td></tr>`;
            document.getElementById('table-foot').innerHTML = tfootHTML;

            calcularMediasEmTempoReal();
        }

        // OTIMIZAÇÃO: Atualização suave que previne travamentos durante a digitação
        function atualizarValoresNaTela() {
            const inputs = document.querySelectorAll('.cell-input');
            inputs.forEach(input => {
                const alunoId = input.dataset.aluno;
                const discId = input.dataset.disciplina;
                const chave = `${estado.turmaSelecionada}_${alunoId}_${discId}`;
                const nota = estado.notas[chave];
                
                // Não atualiza o campo que o usuário está editando agora para não "puxar" o cursor dele
                if (document.activeElement !== input) {
                    input.value = nota !== undefined ? nota : '';
                }
            });
            calcularMediasEmTempoReal();
        }

        function calcularMediasEmTempoReal() {
            const turmaId = estado.turmaSelecionada;
            const alunos = DADOS_ESCOLA.alunos[turmaId] || [];
            const disciplinas = DADOS_ESCOLA.disciplinas[turmaId] || [];

            let somaGeralTurma = 0;
            let totalNotasGeral = 0;

            // Médias por Aluno (Linhas)
            alunos.forEach(aluno => {
                let somaAluno = 0;
                let contAluno = 0;

                disciplinas.forEach(d => {
                    const chave = `${turmaId}_${aluno.id}_${d.id}`;
                    const nota = estado.notas[chave];
                    if (nota !== undefined && nota !== null) {
                        somaAluno += Number(nota);
                        contAluno++;
                    }
                });

                const mediaAlunoElem = document.getElementById(`media-aluno-${aluno.id}`);
                if (mediaAlunoElem) {
                    if (contAluno > 0) {
                        const media = somaAluno / contAluno;
                        mediaAlunoElem.textContent = media.toFixed(1);
                        somaGeralTurma += media;
                        totalNotasGeral++;
                    } else {
                        mediaAlunoElem.textContent = '-';
                    }
                }
            });

            // Médias por Disciplina (Colunas)
            disciplinas.forEach(d => {
                let somaDisc = 0;
                let contDisc = 0;

                alunos.forEach(aluno => {
                    const chave = `${turmaId}_${aluno.id}_${d.id}`;
                    const nota = estado.notas[chave];
                    if (nota !== undefined && nota !== null) {
                        somaDisc += Number(nota);
                        contDisc++;
                    }
                });

                const mediaDiscElem = document.getElementById(`media-disc-${d.id}`);
                if (mediaDiscElem) {
                    if (contDisc > 0) {
                        mediaDiscElem.textContent = (somaDisc / contDisc).toFixed(1);
                    } else {
                        mediaDiscElem.textContent = '-';
                    }
                }
            });

            // Média Geral da Turma (Canto inferior direito)
            const mediaGeralElem = document.getElementById('media-geral-turma');
            if (mediaGeralElem) {
                if (totalNotasGeral > 0) {
                    mediaGeralElem.textContent = (somaGeralTurma / totalNotasGeral).toFixed(1);
                } else {
                    mediaGeralElem.textContent = '-';
                }
            }
        }

        // ============================================================================
        // 4. UTILITÁRIOS (Toast, Status UI)
        // ============================================================================
        
        function exportarParaCSV() {
            const turmaId = estado.turmaSelecionada;
            const alunos = DADOS_ESCOLA.alunos[turmaId] || [];
            const disciplinas = DADOS_ESCOLA.disciplinas[turmaId] || [];
            
            if (alunos.length === 0) {
                alert("Não há alunos para exportar nesta turma.");
                return;
            }

            // BOM para Excel reconhecer acentos (UTF-8)
            let csvContent = "\uFEFF"; 
            
            // Cabeçalho
            let header = ["Nome do Aluno"];
            disciplinas.forEach(d => header.push(d.nome));
            header.push("Média do Aluno");
            csvContent += header.join(";") + "\r\n";

            // Linhas dos Alunos
            alunos.forEach(aluno => {
                let row = [aluno.nome];
                let soma = 0; 
                let cont = 0;
                
                disciplinas.forEach(d => {
                    const chave = `${turmaId}_${aluno.id}_${d.id}`;
                    let nota = estado.notas[chave];
                    if (nota !== undefined && nota !== null) {
                        row.push(nota.toString().replace('.', ',')); // Formato BR
                        soma += Number(nota);
                        cont++;
                    } else {
                        row.push("");
                    }
                });
                
                let media = cont > 0 ? (soma / cont).toFixed(1).replace('.', ',') : "";
                row.push(media);
                csvContent += row.join(";") + "\r\n";
            });

            // Download do arquivo
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            const dataAtual = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
            const nomeTurma = DADOS_ESCOLA.turmas.find(t=>t.id===turmaId).nome;
            
            link.setAttribute("href", url);
            link.setAttribute("download", `Backup_Notas_${nomeTurma}_${dataAtual}.csv`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function atualizarStatusNuvem(ok, texto) {
            const icone = document.getElementById('cloud-icon');
            const spanText = document.getElementById('cloud-text');
            spanText.textContent = texto;
            
            if (ok) {
                icone.className = "fas fa-cloud-check text-green-300";
            } else {
                icone.className = "fas fa-cloud-xmark text-red-300";
            }
        }

        function mostrarToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Iniciar tudo quando a página carregar
        window.addEventListener('DOMContentLoaded', () => {
            inicializarInterface();
            inicializarFirebase();
        });

    </script>
</body>
