<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas - Acesso Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Desabilita a seleção de texto na página inteira para dificultar cópias */
        body {
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Estilos adicionais para a tabela parecer uma planilha */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        .cell-input {
            width: 100%;
            height: 100%;
            min-height: 48px;
            text-align: center;
            background: transparent;
            outline: none;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
        }
        .cell-input:hover {
            background: #f8fafc;
        }
        .cell-input:focus {
            border: 2px solid #3b82f6;
            background: #eff6ff;
            border-radius: 6px;
            transform: scale(1.02);
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
            z-index: 10;
            position: relative;
        }
        .cell-input:invalid {
            background: #fee2e2;
            color: #b91c1c;
        }
        table { border-spacing: 0; }
        tbody tr { transition: background-color 0.2s ease; }
        tbody tr:hover { background-color: #f1f5f9 !important; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen flex flex-col overflow-hidden" id="app-body">

    <!-- Container principal onde tudo será injetado após a senha -->
    <div id="root-app" class="w-full h-full flex flex-col"></div>

    <!-- Tela de Login Inicial (Fica sobre tudo) -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[99999]">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full mx-4 text-center transform transition-all">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-shield-alt text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Acesso Restrito</h2>
            <p class="text-sm text-slate-500 mb-6">Área exclusiva para professores.</p>
            
            <input type="password" id="senha-acesso" class="w-full border-2 border-slate-200 rounded-lg px-4 py-3 mb-4 focus:border-blue-500 outline-none text-center text-lg font-bold tracking-widest transition-colors" placeholder="••••••••">
            
            <button id="btn-entrar" class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3.5 rounded-lg transition-all active:scale-95 shadow-md flex justify-center items-center gap-2">
                <i class="fas fa-sign-in-alt"></i> Acessar Sistema
            </button>
            <p id="erro-senha" class="text-red-500 mt-4 hidden font-semibold text-sm bg-red-50 p-2 rounded border border-red-200">
                <i class="fas fa-exclamation-circle"></i> Senha incorreta.
            </p>
        </div>
    </div>
